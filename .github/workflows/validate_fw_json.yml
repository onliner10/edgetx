---
name: Validate Edge16 fw.json
on:
  push:
    branches:
      - 'main'
      - '[0-9]+.[0-9]+'
    tags:
      - v*
    paths:
      - '.github/workflows/validate_fw_json.yml'
      - 'fw.json'
      - 'tools/validate-json.py'
  pull_request:
    branches:
      - 'main'
      - '[0-9]+.[0-9]+'
    paths:
      - '.github/workflows/validate_fw_json.yml'
      - 'fw.json'
      - 'tools/validate-json.py'
  workflow_dispatch:

jobs:
  json-validate:
    name: Validate TX16S MK2/MK3 fw.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate fw.json syntax and schema
        run: python3 tools/validate-json.py --syntax-only

      - name: Validate fw.json alphabetical order
        run: python3 tools/validate-json.py --order-only

      - name: Validate supported radios are explicit
        run: |
          python3 - <<'PY'
          import json
          import sys

          expected = [
              ["RadioMaster TX16S MK2", "tx16s-"],
              ["RadioMaster TX16S MK3", "tx16smk3-"],
          ]

          with open("fw.json", encoding="utf-8") as handle:
              actual = json.load(handle).get("targets")

          if actual != expected:
              print("fw.json must list exactly the Edge16-supported radios:", file=sys.stderr)
              for name, prefix in expected:
                  print(f"- {name} ({prefix})", file=sys.stderr)
              sys.exit(1)
          PY
