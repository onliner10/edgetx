---
name: TX16S MK2/MK3 Nightly Firmware
on:
  schedule:
    - cron: '0 2 * * *' # run at 2 AM UTC
  workflow_dispatch:

concurrency:
  group: 'nightly'
  cancel-in-progress: true

jobs:
  sanitizer-stress:
    name: Sanitizer stress (${{ matrix.radio }}, ${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: tx16s
            radio: RadioMaster TX16S MK2
            sanitizer: address,undefined
          - target: tx16s
            radio: RadioMaster TX16S MK2
            sanitizer: thread
          - target: tx16smk3
            radio: RadioMaster TX16S MK3
            sanitizer: address,undefined
          - target: tx16smk3
            radio: RadioMaster TX16S MK3
            sanitizer: thread
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Run native sanitizer stress
        env:
          FLAVOR: ${{ matrix.target }}
          EDGE16_UV_ACTIVE: 1
          EXTRA_OPTIONS: "-DEDGE16_SANITIZERS=${{ matrix.sanitizer }} -DEDGE16_SAFETY_CHECKS=ON"
          ASAN_OPTIONS: "abort_on_error=1:detect_leaks=0:check_initialization_order=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
          TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"
          CMAKE_BUILD_PARALLEL_LEVEL: 4
        run: uv run --with-requirements requirements.txt bash ./tools/commit-tests.sh

  fuzz-yaml:
    name: Native fuzz smoke
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Clang
        run: |
          apt-get update
          apt-get install -y --no-install-recommends clang
          rm -rf /var/lib/apt/lists/*

      - name: Run native fuzzer smoke
        env:
          CC: clang
          CXX: clang++
          EDGE16_UV_ACTIVE: 1
          ASAN_OPTIONS: "abort_on_error=1:detect_leaks=0"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
        run: |
          uv run --with-requirements requirements.txt cmake --preset fuzzers
          uv run --with-requirements requirements.txt cmake --build --preset fuzz-smoke

  build:
    name: Build firmware (${{ matrix.radio }})
    runs-on: ubuntu-latest
    needs:
      - sanitizer-stress
      - fuzz-yaml
    strategy:
      matrix:
        include:
          - target: tx16s
            radio: RadioMaster TX16S MK2
          - target: tx16smk3
            radio: RadioMaster TX16S MK3
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build firmware ${{ matrix.radio }}
        env:
          FLAVOR: ${{ matrix.target }}
          EDGETX_VERSION_SUFFIX: nightly
          EDGE16_UV_ACTIVE: 1
          EXTRA_OPTIONS: "-DWARNINGS_AS_ERRORS=YES -DEDGE16_SAFETY_CHECKS=ON"
          CMAKE_BUILD_PARALLEL_LEVEL: 4
        run: uv run --with-requirements requirements.txt bash ./tools/build-gh.sh

      - name: Package firmware ${{ matrix.radio }}
        uses: actions/upload-artifact@v7
        with:
          name: edge16-firmware-nightly-${{ matrix.target }}
          path: |
            fw.json
            LICENSE
            ${{ matrix.target }}-*.bin
            ${{ matrix.target }}-*.uf2
          retention-days: 15
          if-no-files-found: error

  deploy:
    name: Deploy release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for changelog

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: edge16-firmware-nightly-*
          path: edge16-firmware-nightly
          merge-multiple: true

      - name: Compose release filename
        run: |
          echo "release_filename=edge16-firmware-nightly-${GITHUB_SHA::8}.zip" >> $GITHUB_ENV
          echo "build_date=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "old_nightly_sha=$(git rev-parse nightly)" >> $GITHUB_ENV

      - name: Zip release file
        uses: montudor/action-zip@v1
        with:
          args: zip -qq -j -r ${{ env.release_filename }} ./edge16-firmware-nightly

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --strip all nightly..HEAD
        env:
          OUTPUT: CHANGELOG.md

      - name: Update nightly tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f nightly
          git push -f origin nightly

      - name: Delete previous nightly release
        run: |
          # Delete the existing nightly release to avoid accumulating assets
          gh release delete nightly --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy nightly release
        uses: softprops/action-gh-release@v2 #softprops/action-gh-release/pull/670 or v3 to clear nodejs log warning
        with:
          tag_name: nightly
          prerelease: true
          name: "Edge16 TX16S MK2/MK3 Nightly"
          body: |
            ## Edge16 TX16S MK2/MK3 Nightly Firmware

            **Commit:** ${{ github.sha }}
            **Built:** ${{ env.build_date }}
            **Supported radios:** RadioMaster TX16S MK2 and RadioMaster TX16S MK3 only.

            This nightly contains Edge16 firmware artifacts only for the supported TX16S MK2/MK3 radios. Do not flash these artifacts on any other EdgeTX radio.

            ### Installation
            Download `${{ env.release_filename }}` and extract the firmware for your exact radio:
            - TX16S MK2 uses `tx16s-*.bin`.
            - TX16S MK3 uses `tx16smk3-*`.

            ## Changes since last nightly build

            ${{ steps.changelog.outputs.content }}

            ---
            **Full Diff:** https://github.com/${{ github.repository }}/compare/${{ env.old_nightly_sha }}...${{ github.sha }}
          files: |
            ${{ env.release_filename }}
