name: Draft Edge16 TX16S MK2/MK3 Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create release for'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Edge16 release draft
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Clean up any previous drafts for this version
        run: |
          TAG="${{ inputs.tag }}"
          if gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q true; then
            echo "Deleting existing draft release for tag: $TAG"
            gh release delete "$TAG" --yes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version info
        id: version
        continue-on-error: false
        run: |
          VERSION="${{ inputs.tag }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Extract codename from CMakeLists.txt
          if [ -f "CMakeLists.txt" ]; then
            CODENAME=$(grep -oP 'set\(CODENAME\s+"\K[^"]+' CMakeLists.txt || echo "")
            if [ -n "$CODENAME" ]; then
              if [ "$CODENAME" = "dev" ]; then
                echo "::error::CODENAME is set to 'dev' for a tagged release! Please update the CODENAME in CMakeLists.txt before creating a release."
                exit 1
              fi
              echo "codename=$CODENAME" >> $GITHUB_OUTPUT
              echo "has_codename=true" >> $GITHUB_OUTPUT
              echo "Found codename: $CODENAME"
            else
              echo "has_codename=false" >> $GITHUB_OUTPUT
              echo "No codename found"
            fi
          else
            echo "has_codename=false" >> $GITHUB_OUTPUT
            echo "CMakeLists.txt not found"
          fi

      - name: Install git-cliff
        run: |
          VERSION=$(wget -qO- https://api.github.com/repos/orhun/git-cliff/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' | sed 's/^v//')
          FILENAME="git-cliff-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          wget -O git-cliff.tar.gz "https://github.com/orhun/git-cliff/releases/download/v${VERSION}/${FILENAME}"
          tar -xzvf git-cliff.tar.gz
          mv git-cliff-${VERSION}/git-cliff /usr/local/bin/

      - name: Generate Changelog and Contributors List
        id: changelog
        run: |
          # Find the previous tag relative to the input tag
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ inputs.tag }}^" 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found. Generating full history for ${{ inputs.tag }}"
            RANGE="${{ inputs.tag }}"
            CONTRIB_RANGE="${{ inputs.tag }}"
          else
            echo "Found previous tag: $PREV_TAG"
            RANGE="$PREV_TAG..${{ inputs.tag }}"
            CONTRIB_RANGE="$RANGE"
          fi

          # Generate the changelog using the explicit range
          git-cliff $RANGE --strip all --output CHANGELOG.md

          # Get unique contributors from the same commit range
          CONTRIBUTORS=$(git log --format='%aN' $CONTRIB_RANGE 2>/dev/null | sort -u | sed 's/^/- /' || echo "")

          # Combine
          CHANGELOG_CONTENT=$(cat CHANGELOG.md)

          {
            echo "changelog<<EOF"
            echo "$CHANGELOG_CONTENT"
            if [ -n "$CONTRIBUTORS" ]; then
              echo ""
              echo "## Thank you to the following contributors who made this release possible!"
              echo "$CONTRIBUTORS"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Download TX16S MK2/MK3 release artifacts
        run: |
          TAG="${{ inputs.tag }}"
          COMMIT_SHA=$(git rev-parse "${TAG}^{commit}")
          echo "Tag $TAG points to commit: $COMMIT_SHA"

          WORKFLOW_RUNS=$(gh run list --commit "$COMMIT_SHA" --status success --limit 100 --json workflowName,databaseId,createdAt --jq '
            map(select(
              .workflowName == "TX16S MK2/MK3 Firmware CI" or
              .workflowName == "TX16S MK2/MK3 Companion" or
              .workflowName == "Publish TX16S MK2/MK3 Firmware Release"
            ))
            | group_by(.workflowName)
            | map(sort_by(.createdAt) | last)
            | .[].databaseId
          ')

          if [ -z "$WORKFLOW_RUNS" ]; then
            echo "::error::No successful TX16S MK2/MK3 release artifact workflows found for $COMMIT_SHA"
            exit 1
          fi

          mkdir -p release-assets

          for run_id in $WORKFLOW_RUNS; do
            echo "Processing Run ID: $run_id"
            gh run download "$run_id" --dir release-assets 2>/dev/null || true
          done

          cd release-assets

          echo "Keeping only Edge16 release artifacts for TX16S MK2/MK3..."
          find . -mindepth 1 -maxdepth 1 -type d \
            ! -name 'edge16-firmware-*' \
            ! -name 'edge16-cpn-*' \
            -exec rm -rf {} +

          # Package remaining folders into zips
          for dir in */; do
            # Ensure we are actually looking at a directory
            [ -d "$dir" ] || continue
            dir_name="${dir%/}"

            echo "Processing folder: $dir_name"

            # Check for existing zip inside (e.g. if firmware was already zipped)
            INNER_ZIP=$(find "$dir" -maxdepth 1 -name "*.zip" | head -n 1)

            if [ -n "$INNER_ZIP" ]; then
              echo "  Found existing zip, pulling it out..."
              mv "$INNER_ZIP" "${dir_name}.zip"
            else
              echo "  No zip found, creating ${dir_name}.zip..."
              (cd "$dir" && zip -r "../${dir_name}.zip" .)
            fi

            # Remove the folder after zipping/moving
            rm -rf "$dir"
          done

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release assets
        run: |
          echo "Release assets to upload:"
          ls -lh release-assets/*.zip

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          draft: true
          prerelease: ${{ contains(inputs.tag, '-rc') || contains(inputs.tag, '-beta') || contains(inputs.tag, '-alpha') }}
          name: Edge16 "${{ steps.version.outputs.codename }}" ${{ steps.version.outputs.version }}
          body: |
            Edge16 "${{ steps.version.outputs.codename }}" ${{ steps.version.outputs.version }} is firmware and Companion support for RadioMaster TX16S MK2 and RadioMaster TX16S MK3 only.

            ${{ (contains(inputs.tag, '-rc') || contains(inputs.tag, '-beta') || contains(inputs.tag, '-alpha')) && '> [!WARNING]
            > This is a pre-release for TX16S MK2/MK3 testers. Back up your radio and model settings before flashing, bench-test your models after updating, and report regressions before using it in the field.' || '' }}

            > [!WARNING]
            > Supported radios are exactly RadioMaster TX16S MK2 and RadioMaster TX16S MK3. Do not flash these firmware files on any other EdgeTX radio.

            > [!WARNING]
            > TX16S MK3 is an STM32H7 radio and updates differently from TX16S MK2. Use the firmware file that matches your exact radio.

            > [!NOTE]
            > Companion artifacts are built only with TX16S MK2/MK3 WASM modules.

            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Supported radios
            - RadioMaster TX16S MK2 uses `tx16s-*.bin`.
            - RadioMaster TX16S MK3 uses `tx16smk3-*`.

            No other radio target is supported by this release.

            ## Installation Guide
            Download the release zip, extract it, choose the firmware file for your exact TX16S model, copy it to the radio SD card `FIRMWARE/` folder, then flash it from the bootloader.

            ## Release assets
            Firmware assets are intentionally limited to TX16S MK2/MK3 outputs. Safety, analyzer, and unsupported upstream artifacts are not attached to this draft.

            ## Known Limitations and Issues
            ${{ (contains(inputs.tag, '-rc') || contains(inputs.tag, '-beta') || contains(inputs.tag, '-alpha')) && '> [!WARNING]
            - Please track release-candidate issues before publishing this release as stable.' || '' }}

            ## UI/UX behavioral changes and/or new capabilities:
          files: release-assets/*.zip
          fail_on_unmatched_files: true
