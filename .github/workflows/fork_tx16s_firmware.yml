---
name: Build Edge16 firmware release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to create or replace
        default: tx16s-custom
        required: true
      version_suffix:
        description: Firmware version suffix shown on the radio
        default: custom
        required: true

concurrency:
  group: tx16s-firmware-release
  cancel-in-progress: true

jobs:
  native-safety:
    name: Native safety tests (${{ matrix.target }}, ${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - tx16s
          - tx16smk3
        sanitizer:
          - address,undefined
          - thread
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Run native sanitizer tests
        env:
          FLAVOR: ${{ matrix.target }}
          EDGE16_UV_ACTIVE: 1
          EXTRA_OPTIONS: "-DEDGE16_SANITIZERS=${{ matrix.sanitizer }} -DEDGE16_SAFETY_CHECKS=ON"
          CMAKE_BUILD_PARALLEL_LEVEL: 4
        run: uv run --with-requirements requirements.txt bash ./tools/commit-tests.sh

  build:
    name: Build Edge16 firmware
    needs: native-safety
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build Edge16 firmware
        env:
          FLAVOR: tx16s;tx16smk3
          FIRMWARE_TARGET: firmware
          EDGETX_VERSION_SUFFIX: ${{ inputs.version_suffix }}
          EDGE16_UV_ACTIVE: 1
          EXTRA_OPTIONS: "-DWARNINGS_AS_ERRORS=YES -DEDGE16_SAFETY_CHECKS=ON"
          CMAKE_BUILD_PARALLEL_LEVEL: 4
        run: uv run --with-requirements requirements.txt bash ./tools/build-gh.sh

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: edge16-firmware
          path: |
            fw.json
            LICENSE
            tx16s-*.bin
            tx16smk3-*.uf2
            tx16smk3-*.bin
          retention-days: 15
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download firmware artifact
        uses: actions/download-artifact@v8
        with:
          name: edge16-firmware
          path: edge16-firmware

      - name: Compose release asset
        run: |
          set -euo pipefail
          cd edge16-firmware
          zip -9 -r "../edge16-firmware-${GITHUB_SHA::8}.zip" .

      - name: Replace release tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f "${{ inputs.release_tag }}" "${GITHUB_SHA}"
          git push -f origin "${{ inputs.release_tag }}"

      - name: Delete previous release
        run: gh release delete "${{ inputs.release_tag }}" --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Edge16 custom firmware
          prerelease: true
          body: |
            Custom Edge16 firmware for RadioMaster TX16S MK2 and TX16S MK3 built from `${{ github.sha }}`.

            Download the zip, extract the firmware for your exact radio, copy it to the radio SD card `FIRMWARE/` folder, then flash it from the bootloader.
          files: edge16-firmware-*.zip
