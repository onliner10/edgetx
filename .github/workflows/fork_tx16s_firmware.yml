---
name: Build TX16S firmware release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to create or replace
        default: tx16s-custom
        required: true
      version_suffix:
        description: Firmware version suffix shown on the radio
        default: custom
        required: true

concurrency:
  group: tx16s-firmware-release
  cancel-in-progress: true

jobs:
  build:
    name: Build TX16S firmware
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build TX16S firmware
        env:
          FLAVOR: tx16s
          FIRMARE_TARGET: firmware
          EDGETX_VERSION_SUFFIX: ${{ inputs.version_suffix }}
          CMAKE_BUILD_PARALLEL_LEVEL: 4
        run: ./tools/build-gh.sh

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: tx16s-firmware
          path: |
            fw.json
            LICENSE
            tx16s-*.bin
          retention-days: 15
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download firmware artifact
        uses: actions/download-artifact@v8
        with:
          name: tx16s-firmware
          path: tx16s-firmware

      - name: Compose release asset
        run: |
          set -euo pipefail
          cd tx16s-firmware
          zip -9 -r "../edgetx-tx16s-${GITHUB_SHA::8}.zip" .

      - name: Replace release tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f "${{ inputs.release_tag }}" "${GITHUB_SHA}"
          git push -f origin "${{ inputs.release_tag }}"

      - name: Delete previous release
        run: gh release delete "${{ inputs.release_tag }}" --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: TX16S custom firmware
          prerelease: true
          body: |
            Custom TX16S firmware built from `${{ github.sha }}`.

            Download the zip, extract the `.bin`, copy it to the radio SD card `FIRMWARE/` folder, then flash it from the EdgeTX bootloader.
          files: edgetx-tx16s-*.zip
