name: TX16S MK2/MK3 Companion

on:
  push:
    branches:
      - 'main'
    tags:
      - v*
    paths:
      - '.github/workflows/companion.yml'
      - '.github/actions/build_companion/**'
      - '.github/actions/python_dependencies/**'
      - '.github/actions/wasi_sdk/**'
      - 'companion/**'
      - 'tools/build-companion.sh'
      - 'tools/build-wasm-modules.sh'
      - 'cmake/wasm/CMakeLists.txt'

  pull_request:
    paths:
      - '.github/workflows/companion.yml'
      - '.github/actions/build_companion/**'
      - '.github/actions/python_dependencies/**'
      - '.github/actions/wasi_sdk/**'
      - 'companion/**'
      - 'tools/build-companion.sh'
      - 'tools/build-wasm-modules.sh'
      - 'cmake/wasm/CMakeLists.txt'

  workflow_dispatch:
    inputs:
      target:
        description: 'Host package to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - macos
          - windows
          - wasm

jobs:
  modules:
    name: WASM modules (${{ matrix.group.radios }})
    runs-on: macos-15
    strategy:
      matrix:
        group:
          - id: tx16s-mk2-mk3
            radios: RadioMaster TX16S MK2/MK3
            target: [tx16s, tx16smk3]

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Python Dependencies
        uses: ./.github/actions/python_dependencies

      - name: Setup WASI SDK
        uses: ./.github/actions/wasi_sdk

      - name: Build TX16S MK2/MK3 modules
        shell: bash
        env:
          FLAVOR: ${{ join(matrix.group.target, ';') }}
          CMAKE_BUILD_TYPE: 'Release'
        run: |
          mkdir output && \
          tools/build-wasm-modules.sh "$(pwd)" "$(pwd)/output/"

      - name: Archive production artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wasm-modules-${{ matrix.group.id }}
          path: ${{ github.workspace }}/output
          if-no-files-found: error
          retention-days: 15

  build-linux:
    name: Linux Companion
    runs-on: ubuntu-latest
    needs: modules
    if: inputs.target == 'all' || inputs.target == 'linux' || inputs.target == ''

    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download WASM modules
        uses: actions/download-artifact@v8
        with:
          pattern: wasm-modules-*
          path: wasm-modules
          merge-multiple: true

      - name: Setup and Build
        uses: ./.github/actions/build_companion
        with:
          os: 'linux'

  build-macos:
    name: macOS Companion
    runs-on: macos-15
    needs: modules
    if: inputs.target == 'all' || inputs.target == 'macos' || inputs.target == ''

    env:
      CMAKE_OSX_ARCHITECTURES: 'x86_64;arm64'
      CMAKE_OSX_DEPLOYMENT_TARGET: '11.0'

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download WASM modules
        uses: actions/download-artifact@v8
        with:
          pattern: wasm-modules-*
          path: wasm-modules
          merge-multiple: true

      - name: Setup and Build
        uses: ./.github/actions/build_companion
        with:
          os: 'macos'
          qt-arch: 'clang_64'

  build-win64:
    name: Windows Companion
    runs-on: windows-2022
    needs: modules
    if: inputs.target == 'all' || inputs.target == 'windows' || inputs.target == ''

    env:
      CMAKE_GENERATOR: 'Ninja'
      CXX: 'clang++'
      CC: 'clang'

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download WASM modules
        uses: actions/download-artifact@v8
        with:
          pattern: wasm-modules-*
          path: wasm-modules
          merge-multiple: true

      - name: Setup and Build
        uses: ./.github/actions/build_companion
        with:
          os: 'win64'
          qt-arch: 'win64_msvc2022_64'
