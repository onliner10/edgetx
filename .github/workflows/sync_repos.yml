name: Manual EdgeTX Upstream Sync

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Space-separated local branches to hard reset from EdgeTX upstream'
        required: true
        default: 'main'
        type: string
      confirm:
        description: 'Type "hard reset from upstream" to confirm this destructive sync'
        required: true
        type: string

jobs:
  sync:
    name: Hard reset selected branches from upstream
    runs-on: ubuntu-latest
    steps:
      - name: Confirm destructive sync
        run: |
          if [ "${{ inputs.confirm }}" != "hard reset from upstream" ]; then
            echo "::error::Confirmation text did not match. This workflow hard-resets branches and must be run deliberately."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure git
        run: |
          git config user.name "Edge16 Sync Bot"
          git config user.email "sync-bot@edge16.local"

      - name: Sync branches from upstream
        env:
          BRANCHES: ${{ inputs.branches }}
        run: |
          git remote add upstream https://github.com/EdgeTX/edgetx.git
          git fetch upstream

          for branch in $BRANCHES; do
            echo "Syncing branch: $branch"

            if ! git ls-remote --exit-code --heads upstream "$branch" >/dev/null 2>&1; then
              echo "Branch $branch does not exist in upstream, skipping."
              continue
            fi

            git checkout -B "$branch" "upstream/$branch"
            git push origin "$branch" --force

            echo "Branch $branch synced to $(git rev-parse HEAD)"
          done

          echo "Manual upstream sync complete."
