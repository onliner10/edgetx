name: 'Setup WASI SDK'
inputs:
  python-version:
    description: 'Python version'
    default: '3.13'

runs:
  using: "composite"
  steps:

    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip' # caching pip dependencies

    - uses: astral-sh/setup-uv@v7

    - run: uv sync
      shell: bash
